<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSBrowser</title>
  <style>
    /* --- Main Browser Container --- */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #1e1e1e;
      color: #ffffff;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* --- 1. Tab Bar (Always at the top) --- */
    #tab-bar {
      display: flex;
      align-items: center;
      background-color: #181818;
      padding: 5px 10px 0 10px;
      height: 35px;
      gap: 5px;
      box-sizing: border-box;
    }

    .tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-width: 100px;
      max-width: 150px;
      height: 30px;
      padding: 0 10px;
      background-color: #2c2c2c;
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      font-size: 12px;
      box-sizing: border-box;
    }

    .tab.active {
      background-color: #1e1e1e;
    }

    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 8px;
    }

    .close-tab {
      color: #ff5f56;
      font-weight: bold;
      cursor: pointer;
      padding: 2px 5px;
    }

    .close-tab:hover {
      background-color: rgba(255, 95, 86, 0.2);
      border-radius: 3px;
    }

    /* --- 2. Navigation Deck --- */
    #nav-bar {
      display: flex;
      align-items: center;
      background-color: #2b2b2b;
      padding: 5px 10px;
      gap: 10px;
      border-bottom: 1px solid #181818;
      height: 40px;
      box-sizing: border-box;
    }

    .nav-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    #url-bar {
      flex-grow: 1;
      background-color: #181818;
      border: 1px solid #444;
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }

    /* --- 3. Main Workspace Area (Webview + Sidebar Split) --- */
    #main-container {
      display: flex;
      position: absolute;
      top: 75px; /* 35px Tab Bar + 40px Nav Bar */
      bottom: 0;
      left: 0;
      right: 0;
      overflow: hidden;
    }

    #content-area {
      flex-grow: 1;
      height: 100%;
      position: relative;
    }

    webview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      display: none;
    }

    webview.active {
      display: flex !important;
    }

    /* --- 4. Sidebar Panels (History & Bookmarks) --- */
    #sidebar {
      width: 250px;
      height: 100%;
      background-color: #1a1a1a;
      border-left: 1px solid #333;
      display: none; /* Toggled with JavaScript */
      flex-direction: column;
      box-sizing: border-box;
    }

    .sidebar-header {
      padding: 10px;
      background-color: #222;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      font-size: 14px;
    }

    .sidebar-content {
      flex-grow: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .sidebar-item {
      padding: 6px 8px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item:hover {
      background-color: #2c2c2c;
    }

    .sidebar-btn {
      background-color: #c92a2a;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 11px;
      cursor: pointer;
    }

    .sidebar-btn:hover {
      background-color: #e03131;
    }
  </style>
</head>
<body>

  <div id="tab-bar">
    <button class="nav-btn" onclick="createNewTab()">+</button>
  </div>

  <div id="nav-bar">
    <button class="nav-btn" onclick="goBack()">⬅</button>
    <button class="nav-btn" onclick="goForward()">➡</button>
    <button class="nav-btn" onclick="reloadPage()">🔄</button>
    <input type="text" id="url-bar" placeholder="Enter URL or search..." onkeydown="handleUrlInput(event)">
    
    <button id="bookmark-btn" class="nav-btn" onclick="toggleBookmark()" title="Bookmark Current Page" style="color: #888;">☆</button>
    
    <button class="nav-btn" onclick="toggleSidebar()" title="Toggle History/Bookmarks">📜</button>
  </div>

  <div id="main-container">
    <div id="content-area"></div>

    <div id="sidebar">
      <div class="sidebar-header">
        <span>History & Saved</span>
        <button class="sidebar-btn" onclick="clearHistory()">Clear All</button>
      </div>
      <div id="sidebar-list" class="sidebar-content"></div>
    </div>
  </div>

  <script>
    let tabs = [];
    let activeTabId = null;

    const tabBar = document.getElementById('tab-bar');
    const contentArea = document.getElementById('content-area');
    const urlBar = document.getElementById('url-bar');
    const sidebar = document.getElementById('sidebar');
    const sidebarList = document.getElementById('sidebar-list');
    const bookmarkBtn = document.getElementById('bookmark-btn');

    // Retrieve storage arrays
    let historyList = JSON.parse(localStorage.getItem('browserHistory')) || [];
    let bookmarksList = JSON.parse(localStorage.getItem('browserBookmarks')) || [];

    // Import ipcRenderer to communicate with main.js
    const { ipcRenderer } = require('electron');

    // --- MAIN EVENT INTERCEPTOR ---
    // When the main process blocks a popup window, open it here as a tab instead
    ipcRenderer.on('open-link-in-tab', (event, url) => {
      createNewTab(url);
    });

    function createNewTab(url = 'https://www.kssearchengine.com') {
      const tabId = 'tab-' + Date.now();

      // Create browser tab UI
      const tabEl = document.createElement('div');
      tabEl.className = 'tab';
      tabEl.id = tabId;
      tabEl.onclick = () => switchTab(tabId);

      const titleEl = document.createElement('span');
      titleEl.className = 'tab-title';
      titleEl.innerText = 'Loading...';
      tabEl.appendChild(titleEl);

      const closeEl = document.createElement('span');
      closeEl.className = 'close-tab';
      closeEl.innerText = '×';
      closeEl.onclick = (e) => {
        e.stopPropagation();
        closeTab(tabId);
      };
      tabEl.appendChild(closeEl);

      // Insert tab directly before the '+' button
      tabBar.insertBefore(tabEl, tabBar.lastElementChild);

      // Create standard Electron Webview frame
      const webview = document.createElement('webview');
      webview.id = 'webview-' + tabId;
      webview.src = url;
      webview.setAttribute('allowpopups', '');

      webview.addEventListener('page-title-updated', (e) => {
        titleEl.innerText = e.title;
      });

      webview.addEventListener('did-navigate', (e) => {
        if (tabId === activeTabId) {
          urlBar.value = e.url;
          updateBookmarkStar(e.url);
        }
        addToHistory(e.url);
      });

      webview.addEventListener('did-navigate-in-page', (e) => {
        if (tabId === activeTabId) {
          urlBar.value = e.url;
          updateBookmarkStar(e.url);
        }
      });

      contentArea.appendChild(webview);
      tabs.push({ id: tabId, element: tabEl, webview: webview });
      switchTab(tabId);
    }

    function switchTab(tabId) {
      tabs.forEach(tab => {
        if (tab.id === tabId) {
          tab.element.classList.add('active');
          tab.webview.classList.add('active');
          
          const currentUrl = tab.webview.src;
          urlBar.value = currentUrl;
          updateBookmarkStar(currentUrl);
          
          activeTabId = tabId;
          tab.webview.focus();
        } else {
          tab.element.classList.remove('active');
          tab.webview.classList.remove('active');
        }
      });
    }

    function closeTab(tabId) {
      const tabIndex = tabs.findIndex(tab => tab.id === tabId);
      if (tabIndex === -1) return;

      const closedTab = tabs[tabIndex];
      closedTab.element.remove();
      
      closedTab.webview.stop();
      closedTab.webview.src = "about:blank"; 
      closedTab.webview.remove();
      
      tabs.splice(tabIndex, 1);

      if (tabs.length === 0) {
        createNewTab();
      } else if (activeTabId === tabId) {
        const newActiveIndex = Math.max(0, tabIndex - 1);
        switchTab(tabs[newActiveIndex].id);
      }
    }

    function getActiveWebview() {
      const activeTab = tabs.find(tab => tab.id === activeTabId);
      return activeTab ? activeTab.webview : null;
    }

    function goBack() {
      const wv = getActiveWebview();
      if (wv && wv.canGoBack()) wv.goBack();
    }

    function goForward() {
      const wv = getActiveWebview();
      if (wv && wv.canGoForward()) wv.goForward();
    }

    function reloadPage() {
      const wv = getActiveWebview();
      if (wv) wv.reload();
    }

    /* --- FIXED URL Input Parser --- */
    function handleUrlInput(event) {
      if (event.key === 'Enter') {
        let input = urlBar.value.trim();
        if (!input) return;

        const wv = getActiveWebview();
        if (!wv) return;

        let targetUrl = input;
        if (!input.includes('.') || input.includes(' ')) {
          targetUrl = `https://www.google.com/search?q=${encodeURIComponent(input)}`;
        } else {
          if (!input.startsWith('http://') && !input.startsWith('https://')) {
            targetUrl = 'https://' + input;
          }
        }
        
        wv.src = targetUrl; 
      }
    }

    /* --- History & Bookmark Actions --- */
    function addToHistory(url) {
      if (!url || url.startsWith('about:') || url === 'https://www.kssearchengine.com') return;
      historyList = historyList.filter(item => item !== url);
      historyList.unshift(url);
      if (historyList.length > 50) historyList.pop();
      localStorage.setItem('browserHistory', JSON.stringify(historyList));
      updateSidebarUI();
    }

    // Dynamic Star Update
    function updateBookmarkStar(url) {
      if (bookmarksList.includes(url)) {
        bookmarkBtn.innerText = "⭐";
        bookmarkBtn.style.color = "#ffd43b"; 
      } else {
        bookmarkBtn.innerText = "☆";
        bookmarkBtn.style.color = "#888888"; 
      }
    }

    function toggleBookmark() {
      const currentUrl = urlBar.value ? urlBar.value.trim() : "";
      if (!currentUrl || currentUrl.startsWith('about:')) return;

      if (bookmarksList.includes(currentUrl)) {
        bookmarksList = bookmarksList.filter(item => item !== currentUrl);
      } else {
        bookmarksList.push(currentUrl);
      }
      
      localStorage.setItem('browserBookmarks', JSON.stringify(bookmarksList));
      updateBookmarkStar(currentUrl);
      updateSidebarUI();
    }

    function clearHistory() {
      historyList = [];
      localStorage.setItem('browserHistory', JSON.stringify([]));
      updateSidebarUI();
    }

    function toggleSidebar() {
      if (sidebar.style.display === 'flex') {
        sidebar.style.display = 'none';
      } else {
        updateSidebarUI();
        sidebar.style.display = 'flex';
      }
    }

    function updateSidebarUI() {
      sidebarList.innerHTML = '';

      // Bookmarks Section
      const bmHeader = document.createElement('div');
      bmHeader.style.fontWeight = 'bold';
      bmHeader.style.color = '#ffd43b';
      bmHeader.style.padding = '5px 0';
      bmHeader.innerText = "⭐ BOOKMARKS";
      sidebarList.appendChild(bmHeader);

      if (bookmarksList.length === 0) {
        const emptyItem = document.createElement('div');
        emptyItem.className = 'sidebar-item';
        emptyItem.innerText = 'No saved bookmarks';
        sidebarList.appendChild(emptyItem);
      } else {
        bookmarksList.forEach(url => {
          const item = document.createElement('div');
          item.className = 'sidebar-item';
          item.innerText = url;
          item.onclick = () => {
            const wv = getActiveWebview();
            if (wv) wv.src = url;
          };
          sidebarList.appendChild(item);
        });
      }

      // History Section
      const histHeader = document.createElement('div');
      histHeader.style.fontWeight = 'bold';
      histHeader.style.color = '#38d9a9';
      histHeader.style.padding = '15px 0 5px 0';
      histHeader.innerText = "📜 RECENT HISTORY";
      sidebarList.appendChild(histHeader);

      if (historyList.length === 0) {
        const emptyItem = document.createElement('div');
        emptyItem.className = 'sidebar-item';
        emptyItem.innerText = 'No history saved';
        sidebarList.appendChild(emptyItem);
      } else {
        historyList.forEach(url => {
          const item = document.createElement('div');
          item.className = 'sidebar-item';
          item.innerText = url;
          item.onclick = () => {
            const wv = getActiveWebview();
            if (wv) wv.src = url;
          };
          sidebarList.appendChild(item);
        });
      }
    }

    window.onload = () => {
      createNewTab();
    };
  </script>
</body>
</html>
